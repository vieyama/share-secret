kind: pipeline
type: docker
name: default

steps:
  - name: build-and-deploy
    image: docker:26-cli
    pull: if-not-exists
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    environment:
      IMAGE_NAME: share-secret-app
      PORT: 5050
    commands:
      - docker version
      - docker info

      # Build and run with docker-compose
      - docker-compose build
      - docker-compose up -d

      - echo "Deployment successful!"
      - echo "App running on port $PORT"

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock

trigger:
  branch:
    - main
